name: AI自动化分析股票

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '请输入股票代码 (如 600339)'
        required: true
        default: '600339'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装必要依赖
        run: |
          python -m pip install --upgrade pip
          # 核心修复：安装 requests 替代报错的 pushplus
          pip install akshare yfinance requests pandas lxml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 启动 AI 分析机器人
        env:
          # 核心修复：将 DeepSeek 映射给程序找的变量名
          GOOGLE_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_BASE: https://api.deepseek.com/v1
          MODEL_NAME: deepseek-chat
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python main.py --ticker ${{ github.event.inputs.stock_code }}

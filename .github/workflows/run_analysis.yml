name: AI自动化分析股票

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '请输入股票代码 (如 600339)'
        required: true
        default: '600339'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装必要依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare yfinance requests pandas lxml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 启动 AI 分析机器人
        env:
          # 1. 既然程序报错说缺这个，我们就把 DeepSeek 的 Key 给它
          GOOGLE_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 2. 告诉程序：虽然你想要 Google，但请去 DeepSeek 的地址
          OPENAI_API_BASE: https://api.deepseek.com/v1
          # 3. 核心修复：强制程序切换模型供应商为 openai (DeepSeek 通用协议)
          MODEL_PROVIDER: openai
          MODEL_NAME: deepseek-chat
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          # 运行主程序
          python main.py --ticker ${{ github.event.inputs.stock_code }}

name: AI自动化分析股票

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '请输入股票代码 (如 600339)'
        required: true
        default: '600339'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装必要依赖
        run: |
          pip install -r requirements.txt
          pip install akshare yfinance requests

      - name: 启动 AI 分析机器人
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python main.py --ticker ${{ github.event.inputs.stock_code }}
